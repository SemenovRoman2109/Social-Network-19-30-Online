<!-- Відкриваємо ліву колонку контактів. -->
<aside class="chat-contacts">
    <!-- Показуємо кнопку, яка відкриває модальне вікно створення групового чату. -->
    <button id="open-group-modal" type="button">Створити груповий чат</button>
    <!-- Відкриваємо блок списку контактів. -->
    <section class="chat-block">
        <!-- Показуємо заголовок блоку контактів. -->
        <h2>Контакти</h2>
        <!-- Перебираємо друзів поточного користувача. -->
        {% for friend in friends %}
            <!-- Показуємо кнопку відкриття чату з другом. -->
            <button type="button" class="chat-user-button" data-chat-user="{{ friend.id }}" data-chat-username="{{ friend.username }}">
                <!-- Показуємо email друга. -->
                {{ friend.username }}
            </button>
        <!-- Якщо друзів немає. -->
        {% empty %}
            <!-- Показуємо порожній стан контактів. -->
            <p>Контактів поки немає</p>
        <!-- Закриваємо цикл друзів. -->
        {% endfor %}
    </section>
</aside>
